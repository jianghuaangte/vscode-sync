name: Sync VSCode Releases

on:
workflow_dispatch:

schedule:
- cron: "0 3 * * *"

permissions:
contents: write

jobs:
sync:
runs-on: ubuntu-latest

```
steps:
  - name: Get latest version
    id: version
    run: |
      VERSION=$(curl -fsSL \
        https://update.code.visualstudio.com/api/releases/stable \
        | jq -r '.[0]')

      echo "version=$VERSION" >> $GITHUB_OUTPUT

  - name: Check release exists
    id: release
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    run: |
      TAG=${{ steps.version.outputs.version }}

      if gh release view "$TAG" >/dev/null 2>&1; then
        echo "exists=true" >> $GITHUB_OUTPUT
      else
        echo "exists=false" >> $GITHUB_OUTPUT
      fi

  - name: Create release
    if: steps.release.outputs.exists == 'false'
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    run: |
      gh release create \
        "${{ steps.version.outputs.version }}" \
        --title "VS Code ${{ steps.version.outputs.version }}" \
        --notes "Automatically mirrored from Microsoft"

  - name: Download packages
    run: |
      mkdir downloads

      VERSION=${{ steps.version.outputs.version }}

      cat > platforms.txt << 'EOF'
      win32-x64
      win32-x64-user
      win32-x64-archive

      win32-arm64
      win32-arm64-user
      win32-arm64-archive

      linux-x64
      linux-deb-x64
      linux-rpm-x64

      linux-arm64
      linux-deb-arm64
      linux-rpm-arm64

      linux-armhf
      linux-deb-armhf
      linux-rpm-armhf

      darwin
      darwin-arm64

      cli-win32-x64
      cli-win32-arm64

      cli-linux-x64
      cli-linux-arm64
      cli-linux-armhf

      cli-darwin-x64
      cli-darwin-arm64
      EOF

      while read PLATFORM; do

        URL="https://update.code.visualstudio.com/${VERSION}/${PLATFORM}/stable"

        echo "Downloading $PLATFORM"

        if curl -L \
            --fail \
            --retry 3 \
            -o "downloads/${PLATFORM}" \
            "$URL"; then

          echo "OK: $PLATFORM"

        else
          echo "SKIP: $PLATFORM"
          rm -f "downloads/${PLATFORM}"
        fi

      done < platforms.txt

  - name: Upload assets
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    run: |
      TAG=${{ steps.version.outputs.version }}

      for FILE in downloads/*; do
        [ -f "$FILE" ] || continue

        echo "Uploading $(basename "$FILE")"

        gh release upload \
          "$TAG" \
          "$FILE" \
          --clobber
      done
