name: Sync VSCode Releases

on:
  workflow_dispatch:

  schedule:
    - cron: "0 3 * * *"

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Get latest version
        id: version
        run: |
          VERSION=$(curl -fsSL \
            https://update.code.visualstudio.com/api/releases/stable \
            | jq -r '.[0]')

          echo "Latest Version: $VERSION"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Check release exists
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"

          if gh release view "$VERSION" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create release
        if: steps.check.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"

          gh release create "$VERSION" \
            --title "VS Code $VERSION" \
            --notes "Automatically mirrored from Microsoft VS Code"

      - name: Create platform list
        if: steps.check.outputs.exists == 'false'
        run: |
          cat > platforms.txt <<'EOF'
          win32-x64
          win32-x64-user
          win32-x64-archive

          win32-arm64
          win32-arm64-user
          win32-arm64-archive

          linux-x64
          linux-deb-x64
          linux-rpm-x64

          linux-arm64
          linux-deb-arm64
          linux-rpm-arm64

          linux-armhf
          linux-deb-armhf
          linux-rpm-armhf

          darwin
          darwin-arm64

          cli-win32-x64
          cli-win32-arm64

          cli-linux-x64
          cli-linux-arm64
          cli-linux-armhf

          cli-darwin-x64
          cli-darwin-arm64
          EOF

      - name: Download packages
        if: steps.check.outputs.exists == 'false'
        run: |
          VERSION="${{ steps.version.outputs.version }}"

          mkdir -p downloads

          while read PLATFORM; do

            [ -z "$PLATFORM" ] && continue

            URL="https://update.code.visualstudio.com/${VERSION}/${PLATFORM}/stable"

            echo "==== $PLATFORM ===="

            FINAL_URL=$(curl -sIL "$URL" | grep -i '^location:' | tail -1 | tr -d '\r' | cut -d' ' -f2-)

            if [ -z "$FINAL_URL" ]; then
              echo "Skip $PLATFORM"
              continue
            fi

            FILENAME=$(basename "${FINAL_URL%%\?*}")

            echo "Downloading $FILENAME"

            curl -L \
              --fail \
              --retry 3 \
              --retry-delay 5 \
              -o "downloads/$FILENAME" \
              "$URL"

          done < platforms.txt

      - name: Upload assets
        if: steps.check.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"

          for FILE in downloads/*; do
            [ -f "$FILE" ] || continue

            echo "Uploading $(basename "$FILE")"

            gh release upload \
              "$VERSION" \
              "$FILE" \
              --clobber
          done
